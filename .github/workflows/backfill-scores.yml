name: Backfill Legacy Scores

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, no API calls)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Safety net — scoring 50+ jobs takes time

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run backfill
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_DATABASE_ID: "ac20106e-1c1c-4000-8065-f57850f48d10"
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python scripts/backfill_scores.py --dry-run
          else
            python scripts/backfill_scores.py
          fi
