name: Deadline Reminder

# DISABLED: Apps Script sendDeadlineReminder handles this now (script.google.com)
# Schedule removed — moved to Apps Script to avoid GMAIL_APP_PASSWORD dependency
# on:
#   schedule:
#     - cron: "0 14 * * *"
on:
  workflow_dispatch: # manual trigger only, in case you ever need it

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r notifications/requirements.txt

      - name: Send deadline reminder email
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python notifications/notify.py deadline-reminder
