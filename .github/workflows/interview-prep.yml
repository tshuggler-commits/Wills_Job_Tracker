name: Interview Prep Generator

on:
  schedule:
    # Every 2 hours during ET business hours (8 AM - 6 PM ET)
    # UTC equivalents: 13, 15, 17, 19, 21, 23
    - cron: "0 13,15,17,19,21,23 * * *"
  workflow_dispatch:

jobs:
  generate-prep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r interview_prep/requirements.txt

      - name: Generate interview prep
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: python -m interview_prep.prep run
