name: Daily Job Digest

# DISABLED: Apps Script handles the daily digest now (script.google.com)
# Schedule removed to stop failing runs (missing GMAIL_APP_PASSWORD secret)
# on:
#   schedule:
#     - cron: "0 13 * * *"
on:
  workflow_dispatch: # manual trigger only, in case you ever need it

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r notifications/requirements.txt

      - name: Send daily digest email
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python notifications/notify.py daily-digest
