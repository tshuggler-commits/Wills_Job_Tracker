name: Daily Job Digest

# Runs at 1 PM UTC daily = 8 AM EST / 9 AM EDT
# One hour after the job search pipeline (7 AM ET) to ensure Notion is populated
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r notifications/requirements.txt

      - name: Send daily digest email
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python notifications/notify.py daily-digest
